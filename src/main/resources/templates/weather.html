<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Weather Forecast</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:linear-gradient(135deg,#4facfe,#00f2fe);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .card{

            width:480px;
            background:white;
            border-radius:20px;
            padding:30px;
            box-shadow:0 15px 35px rgba(0,0,0,.25);
            text-align:center;

        }

        h1{

            color:#2196f3;
            margin-bottom:20px;

        }

        img{

            width:100px;
            height:100px;

        }

        h2{

            margin-top:10px;
            color:#333;

        }

        .temp{

            font-size:42px;
            color:#2196f3;
            font-weight:bold;
            margin:15px 0;

        }

        table{

            width:100%;
            border-collapse:collapse;
            margin-top:20px;

        }

        td{

            padding:12px;
            border-bottom:1px solid #ddd;
            text-align:left;

        }

        td:last-child{

            text-align:right;
            font-weight:bold;

        }

        .btn{

            margin-top:25px;
            display:inline-block;
            text-decoration:none;
            background:#2196f3;
            color:white;
            padding:12px 25px;
            border-radius:8px;
            transition:.3s;

        }

        .btn:hover{

            background:#1976d2;

        }

    </style>

</head>

<body>

<div class="card">

    <h1>Weather Report</h1>

    <img th:src="'https://openweathermap.org/img/wn/' + ${weather.icon} + '@2x.png'">

    <h2 th:text="${weather.city}"></h2>

    <div class="temp">

        <span th:text="${weather.temperature}"></span> °C

    </div>

    <p style="text-transform:capitalize; color:gray;"
       th:text="${weather.description}">
    </p>

    <table>

        <tr>
            <td>🥵 Feels Like</td>
            <td th:text="${weather.feelsLike} + ' °C'"></td>
        </tr>

        <tr>
            <td>🔻 Minimum Temp</td>
            <td th:text="${weather.minTemp} + ' °C'"></td>
        </tr>

        <tr>
            <td>🔺 Maximum Temp</td>
            <td th:text="${weather.maxTemp} + ' °C'"></td>
        </tr>

        <tr>
            <td>💧 Humidity</td>
            <td th:text="${weather.humidity} + ' %'"></td>
        </tr>

        <tr>
            <td>🌬 Wind Speed</td>
            <td th:text="${weather.windSpeed} + ' m/s'"></td>
        </tr>

        <tr>
            <td>📊 Pressure</td>
            <td th:text="${weather.pressure} + ' hPa'"></td>
        </tr>

    </table>

    <a href="/" class="btn">
        🔍 Search Another City
    </a>
    <hr>

    <h2 style="margin-top:25px;">5-Day Forecast</h2>

    <div style="display:flex;
            flex-wrap:wrap;
            justify-content:center;
            gap:15px;
            margin-top:20px;">

        <div th:each="forecast : ${weather.forecastList}"
             style="width:130px;
                padding:15px;
                border-radius:12px;
                background:#f5f5f5;
                box-shadow:0 3px 10px rgba(0,0,0,.1);">

            <p>
                <strong th:text="${forecast.date}"></strong>
            </p>

            <img th:src="'https://openweathermap.org/img/wn/' + ${forecast.icon} + '@2x.png'"
                 width="60"
                 height="60">

            <p>
                🌡 <span th:text="${forecast.temperature}"></span> °C
            </p>

            <p style="text-transform:capitalize;"
               th:text="${forecast.description}">
            </p>

        </div>

    </div>

    <br>

    <a href="/" class="btn">
        🔍 Search Another City
    </a>

</body>

</html>
