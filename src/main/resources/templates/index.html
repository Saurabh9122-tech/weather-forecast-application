<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Weather Forecast</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
        }

        .container {
            width: 90%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            color: white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.25);
            animation: fadeIn 1s ease;
        }

        .weather-icon {
            font-size: 70px;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 2.3rem;
            margin-bottom: 15px;
        }

        h3 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #ffe082;
        }

        p {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        input {
            width: 80%;
            padding: 15px;
            border: none;
            border-radius: 50px;
            outline: none;
            font-size: 18px;
            text-align: center;
            margin-bottom: 20px;
        }

        .btn {
            display: inline-block;
            padding: 14px 30px;
            background: white;
            color: #2196f3;
            border: none;
            cursor: pointer;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: #2196f3;
            color: white;
            transform: scale(1.05);
        }


        /* Loading Section */
        #loading {
            display: none;
            margin-top: 25px;
            font-size: 20px;
            font-weight: bold;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0.5;
            }
        }


        /* Footer */
        footer {
            margin-top: 35px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.3);
            font-size: 14px;
            opacity: 0.9;
        }


        @keyframes fadeIn {

            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }

        }

    </style>

</head>


<body>


<div class="container">


    <div class="weather-icon">
        🌤️
    </div>


    <h1>
        Weather Forecast Application
    </h1>


    <h3>
        Welcome,Buddy 👋
    </h3>


    <p>
        Spring Boot is running successfully.<br>
        Search real-time weather forecasts for any city around the world.
    </p>



    <form action="/weather" method="get" onsubmit="showLoading()">

        <input
                type="text"
                name="city"
                placeholder="Enter City Name"
                required>


        <br><br>


        <button class="btn" type="submit">
            🌍 Check Weather
        </button>


    </form>



    <!-- Loading Message -->
    <div id="loading">
        Searching Weather... ⏳
    </div>



    <footer>

        <p>
            Developed by <b>Saurabh Kumar</b>
        </p>

        <p>
            Java | Spring Boot | Thymeleaf | OpenWeather API
        </p>

    </footer>


</div>



<script>

    function showLoading(){

        document.getElementById("loading").style.display = "block";

    }

</script>



</body>

</html>
